name: validate

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - '**.yml'
      - '**.yaml'
      - '**.json'
      - '**.md'
      - 'requirements-dev.txt'
      - '.github/workflows/validate.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.py'
      - '**.yml'
      - '**.yaml'
      - '**.json'
      - '**.md'
      - 'requirements-dev.txt'
      - '.github/workflows/validate.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python (${{ matrix.python-version }})
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 'requirements-dev.txt'

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run validator (all checks)
        run: python3 scripts/validate.py --root . --check all

      - name: Run validator (smoke-test regression guard)
        run: python3 scripts/validate.py --check smoke-test

      - name: Run runtime_eval (structural pass)
        run: python3 scripts/runtime_eval.py --root .

      - name: Run pytest
        run: python3 -m pytest tests/ -v --tb=short
